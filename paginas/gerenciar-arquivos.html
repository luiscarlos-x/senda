<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="icon" type="image/png" href="../css/image/senda.png">
    <title>Gerenciar Arquivos - Senda</title>
    <meta name="description" content="Gerencie os arquivos recebidos nas sessões da sua empresa">
    <link rel="stylesheet" href="../css/main.css">
    <link rel="stylesheet" href="../css/receive-file.css">
    <link rel="stylesheet" href="../css/gerenciar-arquivos.css">
    <script src="../javascript/theme.js"></script>
</head>

<body>
    <div class="container">
        <header class="header">
            <div class="logo" onclick="window.location.href='/'">
                <img src="../css/image/senda.png" alt="Senda Logo">
                <span class="logo-text">Senda</span>
            </div>
        </header>

        <main class="manage-main">
            <!-- Header com navegação -->
            <div class="manage-header-simple">
                <button class="back-home-button" onclick="window.location.href='receber-arquivo.html'">
                    <svg viewBox="0 0 20 20" fill="currentColor">
                        <path fill-rule="evenodd"
                            d="M9.707 16.707a1 1 0 01-1.414 0l-6-6a1 1 0 010-1.414l6-6a1 1 0 011.414 1.414L5.414 9H17a1 1 0 110 2H5.414l4.293 4.293a1 1 0 010 1.414z"
                            clip-rule="evenodd" />
                    </svg>
                    Voltar
                </button>
                <div class="business-user-info">
                    <span class="company-badge" id="companyBadge">Empresa</span>
                </div>
            </div>

            <h1 class="manage-page-title">Gerenciar Arquivos</h1>
            <p class="manage-page-subtitle">Arquivos recebidos organizados por sessão</p>

            <!-- Loading State -->
            <div id="loadingState"
                style="display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 200px; gap: var(--spacing-sm);">
                <div
                    style="width: 44px; height: 44px; border: 4px solid var(--warm-gray); border-top-color: var(--sage-dark); border-radius: 50%; animation: spin 1s linear infinite;">
                </div>
                <p style="color: var(--text-secondary); font-size: var(--font-size-sm); font-weight: 500;">Carregando
                    arquivos...</p>
            </div>

            <!-- Grid de Pastas -->
            <div class="folders-grid" id="foldersGrid" style="display: none;"></div>

            <!-- Estado Vazio -->
            <div class="empty-state" id="emptyState" style="display: none;">
                <div class="empty-state-icon">
                    <svg viewBox="0 0 80 64" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <path
                            d="M4 12C4 8.68629 6.68629 6 10 6H28L36 16H70C73.3137 16 76 18.6863 76 22V52C76 55.3137 73.3137 58 70 58H10C6.68629 58 4 55.3137 4 52V12Z"
                            fill="currentColor" opacity="0.3" />
                        <path
                            d="M4 24C4 20.6863 6.68629 18 10 18H70C73.3137 18 76 20.6863 76 24V52C76 55.3137 73.3137 58 70 58H10C6.68629 58 4 55.3137 4 52V24Z"
                            fill="currentColor" opacity="0.5" />
                    </svg>
                </div>
                <h3 class="empty-state-title" id="emptyStateTitle">Nenhum arquivo salvo</h3>
                <p class="empty-state-text" id="emptyStateText">Os arquivos recebidos nas sessões aparecerão aqui
                    organizados por pasta.</p>
            </div>
        </main>

        <footer class="footer">
            <p>&copy; 2026 Senda. Todos os direitos reservados.</p>
        </footer>
    </div>

    <script src="../javascript/gerenciar-arquivos.js"></script>
</body>

</html>
